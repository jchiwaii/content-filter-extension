<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Blocked - Safe Browse</title>
  <link rel="icon" href="../../assets/logo.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "Luxury Script";
      src:
        url("../../assets/fonts/luxury/ShouldbeComebackBrushClean.woff2") format("woff2"),
        url("../../assets/fonts/luxury/ShouldbeComebackBrushClean.woff") format("woff"),
        url("../../assets/fonts/luxury/ShouldbeComebackBrushClean.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --paper: #f8f7f4;
      --ink: #1a1918;
      --font: "Urbanist", "Avenir Next", "Inter", "SF Pro Text", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      --display-font: "Luxury Script", cursive;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html,
    body {
      min-width: 320px;
      min-height: 100%;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font);
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(100% - 32px, 980px);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3vw, 34px);
      padding: clamp(28px, 5vw, 72px) 0;
      text-align: center;
    }

    img {
      display: block;
      width: min(100%, 860px);
      height: auto;
      object-fit: contain;
    }

    h1 {
      max-width: 920px;
      margin: 0;
      font-family: var(--display-font);
      font-size: clamp(38px, 7vw, 86px);
      font-weight: 400;
      line-height: 0.95;
      text-transform: lowercase;
    }

    .signoff {
      margin: -8px 0 0;
      font-family: var(--display-font);
      font-size: clamp(13px, 1.5vw, 17px);
      font-weight: 400;
      line-height: 1.4;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <main aria-labelledby="blockedTitle">
    <img src="../../assets/images/404.png" alt="">
    <h1 id="blockedTitle">this is not what you are looking for</h1>
    <p class="signoff">with regards - safe browse</p>
  </main>
</body>
</html>
