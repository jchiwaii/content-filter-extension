<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - Safe Browse</title>
  <link rel="icon" href="../../assets/icons/safe-browse-logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040404;
      --text: #ffffff;
      --muted: #93969f;
      --line: rgba(217, 217, 217, 0.24);
      --safe-green: #4cd971;
      --blue: #2838e3;
      --yellow: #ffb700;
      --font: "Azeret Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html,
    body {
      min-width: 320px;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
    }

    .blocked-shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .blocked-header {
      min-height: 104px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 max(clamp(24px, 5.56vw, 80px), calc((100vw - 1440px) / 2 + 80px));
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--text);
      font-size: clamp(21px, 2.22vw, 32px);
      font-weight: 400;
      line-height: 1.25;
      text-decoration: none;
      text-transform: lowercase;
    }

    .brand img {
      width: 28px;
      height: 37px;
      display: block;
      object-fit: contain;
    }

    .blocked-main {
      flex: 1;
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 42px clamp(24px, 5.56vw, 80px) 72px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 30px;
    }

    .blocked-illustration {
      width: min(820px, 100%);
      height: auto;
      display: block;
      overflow: visible;
    }

    .page-title {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 0;
      color: var(--safe-green);
      font-size: clamp(16px, 2.2vw, 24px);
      font-weight: 500;
      line-height: 1.2;
      text-align: center;
      text-transform: uppercase;
    }

    .page-title::before,
    .page-title::after {
      content: "";
      width: clamp(34px, 6vw, 64px);
      height: 2px;
      background: var(--safe-green);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      min-width: 180px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 24px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--blue);
      color: var(--text);
    }

    .btn-quiet {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }

    .star {
      transform-origin: center;
      animation: soft-pulse 2800ms ease-in-out infinite;
    }

    @keyframes soft-pulse {
      0%, 100% { opacity: 0.38; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.04); }
    }

    @media (max-width: 720px) {
      .blocked-header {
        min-height: 88px;
      }

      .blocked-main {
        align-content: start;
        padding-top: 34px;
        gap: 24px;
      }

      .page-title {
        font-size: 15px;
      }

      .actions,
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

      <h1 class="page-title" id="blockedTitle">Content blocked</h1>

      <div class="actions" aria-label="Blocked page actions">
        <button class="btn btn-primary" type="button" onclick="goBack()">Go back</button>
        <button class="btn btn-quiet" type="button" onclick="openSettings()">Open settings</button>
      </div>
    </main>
  </div>

  <script>
    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '../../site/index.html';
      }
    }

    function openSettings() {
      if (window.chrome?.runtime?.sendMessage) {
        window.chrome.runtime.sendMessage({ action: 'openSettings' });
        return;
      }

      window.location.href = '../settings/settings.html';
    }
  </script>
</body>
</html>
