<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Browse</title>
  <link rel="icon" href="../../assets/images/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="passwordLock" class="password-lock hidden">
    <div class="lock-content">
      <img class="lock-logo" src="../../assets/images/logo.svg" alt="" width="48" height="48">
      <h3>Settings locked</h3>
      <input type="password" id="passwordInput" placeholder="Enter password">
      <button id="unlockBtn" class="btn btn-primary">Unlock</button>
      <p class="error hidden" id="passwordError">Incorrect password</p>
    </div>
  </div>

  <div class="popup-container" id="mainContent">
    <header class="header">
      <div class="header-left">
        <img class="popup-logo" src="../../assets/images/logo.svg" alt="" width="44" height="44">
        <div class="header-text">
          <div class="header-title-line">
            <h1>Safe Browse</h1>
            <span class="status-badge" id="statusBadge">Active</span>
          </div>
          <p>Soap For The Internet</p>
        </div>
      </div>
      <div class="header-right">
        <label class="main-toggle">
          <input type="checkbox" id="mainToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <section class="quick-stats" aria-label="Filtering statistics">
      <div class="stat-item">
        <span class="stat-value" id="wordsFilteredToday">0</span>
        <span class="stat-label">Today</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="totalFiltered">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="sitesBlocked">0</span>
        <span class="stat-label">Blocked</span>
      </div>
    </section>

    <section class="quick-actions" aria-label="Quick actions">
      <button class="action-btn" id="pauseBtn">
        <span class="action-icon">II</span>
        <span>Pause 1hr</span>
      </button>
      <button class="action-btn" id="whitelistBtn">
        <span class="action-icon">OK</span>
        <span>Whitelist</span>
      </button>
      <button class="action-btn" id="dashboardBtn">
        <span class="action-icon">Stats</span>
        <span>Dashboard</span>
      </button>
    </section>

    <section class="settings-section">
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-icon">Text</span>
          <span>Text filtering</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="filterTextToggle" checked>
          <span class="toggle-slider small"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-icon">Image</span>
          <span>Image filtering</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="filterImagesToggle" checked>
          <span class="toggle-slider small"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-icon">Search</span>
          <span>Safe search</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="safeSearchToggle" checked>
          <span class="toggle-slider small"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-icon">Sites</span>
          <span>Site blocking</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="blockSitesToggle" checked>
          <span class="toggle-slider small"></span>
        </label>
      </div>
    </section>

    <section class="collapsible-section">
      <button class="collapsible-header" id="customWordsHeader">
        <span>Custom words</span>
        <span class="collapse-icon">v</span>
      </button>
      <div class="collapsible-content" id="customWordsContent">
        <div class="input-group">
          <input type="text" id="customWordInput" placeholder="Add word">
          <button id="addWordBtn" class="btn btn-small">Add</button>
        </div>
        <div class="tags-list" id="customWordsList"></div>
      </div>
    </section>

    <section class="collapsible-section">
      <button class="collapsible-header" id="whitelistHeader">
        <span>Whitelisted sites</span>
        <span class="collapse-icon">v</span>
      </button>
      <div class="collapsible-content" id="whitelistContent">
        <div class="whitelist-list" id="whitelistList"></div>
      </div>
    </section>

    <footer class="footer">
      <button class="footer-link" id="settingsLink">Settings</button>
    </footer>
  </div>

  <script src="../../src/modules/password.js"></script>
  <script src="popup.js"></script>
</body>
</html>
