<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Browse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="icon" href="../../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="passwordLock" class="password-lock hidden">
    <div class="lock-content">
      <h3>Settings Locked</h3>
      <div class="input-group">
        <input type="password" id="passwordInput" placeholder="Enter Password">
      </div>
      <button id="unlockBtn" class="btn btn-primary">Unlock Settings</button>
      <p class="error hidden" id="passwordError">Incorrect password</p>
    </div>
  </div>

  <div class="popup-container" id="mainContent">
    <header class="header">
      <div class="header-left">
        <div class="header-title-line">
          <h1>Safe Browse</h1>
          <span class="status-badge" id="statusBadge">Active</span>
        </div>
        <p>Soap For The Internet</p>
      </div>
      <div class="header-right">
        <label class="main-toggle">
          <input type="checkbox" id="mainToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <section class="quick-stats" aria-label="Filtering statistics">
      <div class="stat-item">
        <span class="stat-value" id="wordsFilteredToday">0</span>
        <span class="stat-label">Today</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="totalFiltered">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="sitesBlocked">0</span>
        <span class="stat-label">Blocked</span>
      </div>
    </section>

    <section class="quick-actions" aria-label="Quick actions">
      <button class="action-btn" id="pauseBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="action-icon"><rect width="4" height="16" x="6" y="4" rx="1"/><rect width="4" height="16" x="14" y="4" rx="1"/></svg>
        <span>Pause 1hr</span>
      </button>
      <button class="action-btn" id="whitelistBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="action-icon"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.89 0 5.13 1 6.78 1.18a1 1 0 0 1 .83 1Z"/><path d="m9 12 2 2 4-4"/></svg>
        <span>Whitelist</span>
      </button>
    </section>

    <section class="settings-section">
      <div class="setting-row">
        <div class="setting-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="setting-icon"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
          <span>Text filtering</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="filterTextToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="setting-icon"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
          <span>Image filtering</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="filterImagesToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="setting-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Safe search</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="safeSearchToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="setting-icon"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span>Site blocking</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="blockSitesToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <section class="collapsible-section">
      <button class="collapsible-header" id="customWordsHeader">
        <span>Custom words</span>
        <span class="collapse-icon">▼</span>
      </button>
      <div class="collapsible-content" id="customWordsContent">
        <div class="input-group">
          <input type="text" id="customWordInput" placeholder="Add a word...">
          <button id="addWordBtn" class="btn btn-small">Add</button>
        </div>
        <div class="tags-list" id="customWordsList"></div>
      </div>
    </section>

    <section class="collapsible-section">
      <button class="collapsible-header" id="whitelistHeader">
        <span>Whitelisted sites</span>
        <span class="collapse-icon">▼</span>
      </button>
      <div class="collapsible-content" id="whitelistContent">
        <div class="whitelist-list" id="whitelistList"></div>
      </div>
    </section>

  </div>

  <script src="../../src/modules/password.js"></script>
  <script src="popup.js"></script>
</body>
</html>
